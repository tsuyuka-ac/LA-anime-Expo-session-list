let dF="all",cF="all",q="";
function dC(d){return d==="7/2"?"d1":d==="7/3"?"d2":d==="7/4"?"d3":"d4"}
function cC(c){return{panel:"p",screen:"s",concert:"c",fan:"f",academic:"a",workshop:"w",booth:"b"}[c]||"p"}
function cL(c){return{panel:"インダストリー",screen:"上映",concert:"コンサート",fan:"ファン",academic:"学術",workshop:"体験",booth:"ブース"}[c]||c}
function dL(d){return d==="7/2"?"7/2(木)":d==="7/3"?"7/3(金)":d==="7/4"?"7/4(土)":"7/5(日)"}
function render(){
  const sq=q.toLowerCase();
  const f=R.filter(r=>{
    if(dF!=="all"&&r.day!==dF)return false;
    if(cF!=="all"&&r.cat!==cF)return false;
    if(sq&&![r.title,r.guests,r.room,r.company,r.content,r.point].join(" ").toLowerCase().includes(sq))return false;
    return true;
  });
  document.getElementById("cnt").textContent=f.length+"件表示（全"+R.length+"件）";
  document.getElementById("tb").innerHTML=f.map(r=>`<tr>
<td><span class="badge ${dC(r.day)}">${dL(r.day)}</span><br><small style="color:#777">${r.time}</small></td>
<td><div class="title">${r.title}</div><span class="badge ${cC(r.cat)}">${cL(r.cat)}</span></td>
<td><small>${r.guests}</small></td>
<td><small>${r.room}</small></td>
<td><small style="font-weight:600">${r.company}</small></td>
<td><small style="color:#555">${r.content}</small></td>
<td><small class="point">⭐ ${r.point}</small></td>
</tr>`).join("");
}
document.getElementById("dayF").addEventListener("click",e=>{
  const b=e.target.closest("[data-day]");if(!b)return;
  dF=b.dataset.day;
  document.querySelectorAll("[data-day]").forEach(x=>x.classList.remove("active"));
  b.classList.add("active");render();
});
document.getElementById("catF").addEventListener("click",e=>{
  const b=e.target.closest("[data-cat]");if(!b)return;
  cF=b.dataset.cat;
  document.querySelectorAll("[data-cat]").forEach(x=>x.classList.remove("active"));
  b.classList.add("active");render();
});
document.getElementById("q").addEventListener("input",e=>{q=e.target.value;render();});
render();
</script>
